  "sentence-transformers==3.0.1",
  "rank-bm25==0.2.2",
  "rouge-score==0.1.2",
  "bert-score==0.3.13",
  "presidio-analyzer==2.2.355",
  "fastapi==0.111.1",
  "uvicorn==0.30.1",
  "prometheus-client==0.20.0",
  "prometheus-fastapi-instrumentator==7.0.0",
  "slowapi==0.1.9",
  "pyjwt==2.8.0",
  "python-jose==3.3.0",
  "celery==5.4.0",
  "redis==5.0.7",
  "kfp==2.8.0",
  "locust==2.30.1",
  "asyncssh==2.14.2",
]

[project.optional-dependencies]
test = [
  "pytest==8.3.2",
  "pytest-asyncio==0.23.8",
  "pytest-timeout==2.3.1",
  "respx==0.21.1",
  "fakeredis==2.25.1",
  "pytest-cov==5.0.0",
  "torch-geometric==2.5.3",
]

gpu = [
  "torch-geometric==2.5.3",
  "torch-scatter==2.1.2",
  "torch-sparse==0.6.18",
]

serving-gpu = [
  "vllm==0.4.3",
  "bitsandbytes==0.43.1",
]

genomics-distributed = [
  "hail==0.2.131",
]

causal-advanced = [
  "econml==0.14.1",
]

monitoring-advanced = [
  "evidently==0.4.37",
]

# v5 ML + RAG additions — install with: pip install -e '.[v5]'
v5 = [
  "catboost>=1.2.7",
  "pytorch-tabnet>=4.1.0",
  "pgvector>=0.2.5",
  "openai>=1.30.0",
  "tiktoken>=0.7.0",
  "ctgan>=0.7.5",
  "wfdb>=4.1.0",
  "openneuro-py>=0.2.4",
  "lightgbm>=4.3",
  "mapie>=0.8.0",
]

full = [
  "torch-geometric==2.5.3",
  "torch-scatter==2.1.2",
  "torch-sparse==0.6.18",
  "vllm==0.4.3",
  "bitsandbytes==0.43.1",
  "hail==0.2.131",
  "econml==0.14.1",
  "evidently==0.4.37",
  "catboost>=1.2.7",
  "pytorch-tabnet>=4.1.0",
  "pgvector>=0.2.5",
  "openai>=1.30.0",
  "tiktoken>=0.7.0",
  "ctgan>=0.7.5",
  "wfdb>=4.1.0",
  "openneuro-py>=0.2.4",
  "lightgbm>=4.3",
  "mapie>=0.8.0",
  "pytest==8.3.2",
  "pytest-asyncio==0.23.8",
  "pytest-timeout==2.3.1",
  "respx==0.21.1",
  "fakeredis==2.25.1",
  "pytest-cov==5.0.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
# --timeout=60: any individual test that hangs >60s is killed and reported as a
# clean failure instead of stalling the whole CI job. Per-test marks override.
addopts = "-q --cov=neurosynth --cov-report=term-missing --timeout=60"
asyncio_mode = "auto"
timeout_method = "signal"
# Only collect fast, data-independent tests by default.
# test_priority*.py files require real training data and must be run locally.
testpaths = ["tests/unit", "tests/integration"]
