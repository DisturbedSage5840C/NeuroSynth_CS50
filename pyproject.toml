[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neurosynth"
version = "0.1.0"
description = "NeuroSynth data lakehouse and ingestion pipeline"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
  "setuptools>=68,<81",
  "pydantic==2.7.4",
  "pydantic-settings==2.3.4",
  "structlog==24.4.0",
  "tenacity==8.5.0",
  "aiofiles==24.1.0",
  "httpx==0.27.0",
  "asyncpg==0.29.0",
  "psycopg[binary]==3.2.1",
  "boto3==1.34.152",
  "confluent-kafka==2.5.0",
  "pyiceberg[pyarrow,pandas]==0.7.1",
  "pyarrow==15.0.2",
  "pandas==2.2.2",
  "numpy==1.26.4",
  "scipy==1.13.1",
  "neo4j==5.22.0",
  "pydicom==2.4.4",
  "SimpleITK==2.3.1",
  "asyncio-mqtt==0.16.2",
  "nibabel==5.2.1",
  "nilearn==0.10.4",
  "scikit-learn==1.4.2",
  "torch==2.3.1",
  "torchdiffeq==0.2.4",
  "networkx==3.3",
  "mlflow==2.14.3",
  "lifelines==0.29.0",
  "plotly==5.22.0",
  "transformers==4.40.2",
  "scikit-allel==1.3.8",
  "biopython==1.84",
  "pysam==0.22.1",
  "h5py==3.11.0",
  "hdf5plugin==4.4.0",
  "pyliftover==0.4.1",
  "opacus==1.5.2",
  "pytorch-forecasting==1.1.1",
  "pytorch-lightning==2.2.5",
  "optuna==3.6.1",
  "shap==0.45.1",
  "pandera==0.20.2",
  "dowhy==0.13",
  "causal-learn==0.1.3.8",
  "pgmpy==0.1.26",
  "matplotlib==3.8.4",
  "statsmodels==0.14.2",
  "dask==2024.5.2",
  "peft==0.10.0",
  "trl==0.8.6",
  "outlines==0.0.40",
  "langchain==0.2.9",
  "llama-index==0.10.56",
  "qdrant-client==1.9.2",
