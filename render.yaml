# NeuroSynth v5 — production deployment (Render Blueprint).
#
# Stack: FastAPI backend + Vite SPA frontend + Neon Postgres + Upstash Redis.
# Free-tier notes:
#  - Web service sleeps after ~15 min idle; first request cold-starts ~60-90s.
#  - Model artifacts are pulled from GitHub Release on build (no R2 needed).
#  - Neon Postgres free tier is permanent (no 30-day expiry).

services:
  # ── Backend API (FastAPI) ─────────────────────────────────────────────────
  - type: web
    name: neurosynth-api
    runtime: python
    plan: free
    buildCommand: >-
      pip install --no-cache-dir -r backend/requirements-deploy.txt &&
      mkdir -p models &&
      curl -fsSL https://github.com/DisturbedSage5840C/NeuroSynth/releases/download/v5-models/neurosynth-models-v5.tar.gz
      | tar xz
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: PYTHONPATH
        value: .:/opt/render/project/src
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
      - key: NEUROSYNTH_APP_ENV
        value: prod
      - key: NEUROSYNTH_AUTH_COOKIE_SECURE
        value: "true"
      # Neon Postgres — set this to your Neon connection string.
      - key: NEUROSYNTH_POSTGRES_DSN
        sync: false
      - key: NEUROSYNTH_JWT_SECRET
        generateValue: true
      - key: NEUROSYNTH_PATIENT_HASH_SECRET
        generateValue: true
      # Upstash Redis URL — get from upstash.com (free tier).
      - key: NEUROSYNTH_REDIS_URL
        sync: false
      # CORS: set to your Vercel frontend URL after first deploy.
      - key: NEUROSYNTH_ALLOWED_ORIGINS
        sync: false
      # Optional: Anthropic key enables Claude SOAP reports.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEUROSYNTH_ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      # Keep free-tier warm.
      - key: KEEPALIVE_ENABLED
        value: "true"
      # Never run the Kaggle pretrain subprocess on cloud deploys — models are
      # downloaded from the GitHub Release tarball at build time.
      - key: SKIP_PRETRAIN
        value: "1"

  # ── Frontend (Vite static SPA) ────────────────────────────────────────────
  - type: web
    name: neurosynth-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Set to your Render backend URL: https://neurosynth-api.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
