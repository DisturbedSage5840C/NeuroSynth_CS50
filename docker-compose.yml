version: '3.8'

services:
  # ─── Core Data ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neurosynth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Application ─────────────────────────────────────────
  neurosynth:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEUROSYNTH_POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/neurosynth
      - NEUROSYNTH_REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    volumes:
      # Mount the whole data dir so the container sees data/realistic_v4.parquet
      # (the v4 training set); the legacy CSV stays as the fallback.
      - ./data:/app/data
      - ./neurological_disease_data.csv:/app/neurological_disease_data.csv
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    command: >
      celery -A backend.celery_app:celery_app worker
      --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - NEUROSYNTH_POSTGRES_DSN=postgresql://postgres:postgres@postgres:5432/neurosynth
      - NEUROSYNTH_REDIS_URL=redis://redis:6379/0
    volumes:
      # Mount the whole data dir so the container sees data/realistic_v4.parquet
      # (the v4 training set); the legacy CSV stays as the fallback.
      - ./data:/app/data
      - ./neurological_disease_data.csv:/app/neurological_disease_data.csv
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Model Server (v2) ──────────────────────────────────
  model-server:
    build:
      context: .
      dockerfile: Dockerfile.model
    ports:
      - "8001:8001"
    environment:
      - MODEL_REGISTRY_PATH=/app/models
      - PROMETHEUS_PORT=8001
    volumes:
      - ./models:/app/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Streaming ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "neurosynth-local-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── Observability ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - neurosynth

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: neurosynth
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ─── Exporters ───────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/neurosynth?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
  prometheus_data:
  grafana_data:
