<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroSynth</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      background: #f5f5f5;
      padding: 0 16px;
    }
    h1 { color: #2c3e50; }
    input {
      width: 100%;
      padding: 8px;
      margin: 6px 0 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background: #2980b9;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    #result {
      margin-top: 24px;
      padding: 16px;
      background: white;
      border-radius: 8px;
      font-size: 18px;
      min-height: 28px;
    }
  </style>
</head>
<body>
  <h1>NeuroSynth</h1>
  <p>Enter patient data to predict neurological risk.</p>

  <label>Age</label><input id="age" type="number" value="75">
  <label>Education (years)</label><input id="educ" type="number" value="12">
  <label>Socioeconomic Status (1-5)</label><input id="ses" type="number" value="2">
  <label>MMSE Score (0-30)</label><input id="mmse" type="number" value="24">
  <label>CDR Score (0, 0.5, 1, 2)</label><input id="cdr" type="number" step="0.5" value="0.5">
  <label>eTIV</label><input id="etiv" type="number" value="1450">
  <label>nWBV</label><input id="nwbv" type="number" step="0.001" value="0.72">
  <label>ASF</label><input id="asf" type="number" step="0.001" value="1.2">

  <button onclick="predictRisk()">Predict Risk</button>
  <div id="result"></div>

  <script>
    async function predictRisk() {
      const data = {
        age: +document.getElementById('age').value,
        educ: +document.getElementById('educ').value,
        ses: +document.getElementById('ses').value,
        mmse: +document.getElementById('mmse').value,
        cdr: +document.getElementById('cdr').value,
        etiv: +document.getElementById('etiv').value,
        nwbv: +document.getElementById('nwbv').value,
        asf: +document.getElementById('asf').value
      };

      const res = await fetch('http://localhost:8000/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      document.getElementById('result').innerHTML =
        '<strong>Prediction:</strong> ' + result.prediction + '<br>' +
        '<strong>Confidence:</strong> ' + result.confidence + '%';
    }
  </script>
</body>
</html>
