name: neurosynth-cicd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: neurosynth/app
  DOCKER_BUILDKIT: "1"

jobs:
  ci-cpu:
    name: ci-${{ matrix.python-version }}-cpu
    runs-on: ubuntu-latest
    # Surface chronic pytest hangs as a fast clear failure instead of a 6h silent
    # cancellation (GitHub's default). Bounds the time deploy-render/deploy-vercel
    # wait on the upstream gate.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: .:src
        run: pytest -q --cov

      - name: Release gate
        env:
          NEUROSYNTH_APP_ENV: dev
          NEUROSYNTH_JWT_SECRET: ci-release-gate-secret-not-for-prod
          NEUROSYNTH_PATIENT_HASH_SECRET: ci-test-patient-secret
          NEUROSYNTH_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/neurosynth
          NEUROSYNTH_ALLOWED_ORIGINS: http://localhost:5173
          NEUROSYNTH_REDIS_URL: redis://localhost:6379/0
        run: python scripts/release_gate.py

      - name: Build container image (local for scan)
        if: matrix.python-version == '3.12'
        uses: docker/setup-buildx-action@v3

      - name: Docker build for Trivy scan
        if: matrix.python-version == '3.12'
        run: docker buildx build --load -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Trivy security scan (SARIF)
        if: matrix.python-version == '3.12'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.python-version }}-cpu.sarif

      - name: Upload Trivy SARIF
        if: matrix.python-version == '3.12'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.python-version }}-cpu.sarif

  ci-gpu:
    name: ci-${{ matrix.python-version }}-gpu
    # Explicitly gated to avoid indefinite queued checks when no GPU runners are available.
    if: vars.ENABLE_GPU_RUNNERS == 'true'
    runs-on: [self-hosted, linux, x64, gpu]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: .:src
        run: pytest -q --cov

      - name: Release gate
        env:
          NEUROSYNTH_APP_ENV: dev
          NEUROSYNTH_JWT_SECRET: ci-release-gate-secret-not-for-prod
          NEUROSYNTH_PATIENT_HASH_SECRET: ci-test-patient-secret
          NEUROSYNTH_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/neurosynth
          NEUROSYNTH_ALLOWED_ORIGINS: http://localhost:5173
          NEUROSYNTH_REDIS_URL: redis://localhost:6379/0
        run: python scripts/release_gate.py

      - name: Build container image (local for scan)
        uses: docker/setup-buildx-action@v3

      - name: Docker build for Trivy scan
        run: docker buildx build --load -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Trivy security scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.python-version }}-gpu.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.python-version }}-gpu.sarif

  docker-push:
    name: docker-push
    runs-on: ubuntu-latest
    needs: [ci-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DOCKER_PUSH == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # If DOCKERHUB_USERNAME is not configured, this falls back to repo owner.
          username: ${{ vars.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_K8S_DEPLOY == 'true'
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install staging
        run: |
          helm upgrade --install neurosynth-staging ./helm/neurosynth \
            --namespace neurosynth-staging \
            --create-namespace \
            --values ./helm/neurosynth/values.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}

  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_K8S_DEPLOY == 'true'
    # Manual approval gate is handled by required reviewers on the prod environment.
    environment:
      name: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm upgrade/install production
        run: |
          helm upgrade --install neurosynth ./helm/neurosynth \
            --namespace neurosynth-prod \
            --create-namespace \
            --values ./helm/neurosynth/values.yaml \
            --values ./helm/neurosynth/values-prod.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}

  # ---- Free-tier deploy (Render backend + Vercel frontend) ----
  # Each step self-skips when its secret is absent, so the job stays green until
  # you configure the deploy hooks/tokens (see DEPLOYMENT.md / Final Deploy guide).
  deploy-render:
    name: deploy-render
    runs-on: ubuntu-latest
    needs: [ci-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render redeploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping Render deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-vercel:
    name: deploy-vercel
    runs-on: ubuntu-latest
    needs: [ci-cpu]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Vercel configuration
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN not set — skipping Vercel deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        if: steps.check.outputs.configured == 'true'
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Vercel
        if: steps.check.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

