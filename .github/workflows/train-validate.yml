name: train-validate

# v4 model gate: regenerates the realistic synthetic set, trains the full stack,
# and fails the build if the ensemble AUC drops below the 0.92 release gate.
# Additive to deploy.yml / qa.yml — does not touch the existing pipelines.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "src/neurosynth/**"
      - "scripts/data/**"
      - "train.py"
      - "backend/requirements.txt"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  train-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Train on the committed, validated dataset so the AUC gate is reproducible.
      # (np.random.RandomState streams differ across numpy versions, so regenerating
      # here would produce a platform-variant dataset and a flaky gate.) Only
      # regenerate as a fallback if the committed file is somehow missing.
      - name: Ensure dataset present
        run: |
          if [ ! -f data/realistic_v4.parquet ]; then
            python scripts/data/build_realistic_synthetic.py --n 15000 --noise 0.5 --gain 2.5 --seed 42 --out data/realistic_v4.parquet
          fi

      - name: Train full stack and enforce AUC >= 0.92 gate
        env:
          PYTHONPATH: .:src
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: python train.py --validate

      - name: Upload model artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: models/
          retention-days: 7
